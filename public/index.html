<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Scramjet</title>
    <link rel="shortcut icon" content="favicon.webp" />

    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>

    <link rel="stylesheet" href="index.css" />
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>
  </head>
  <body>
    <form id="sj-form" style="display:none">
      <input id="sj-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
      <input id="sj-address" type="text" />
    </form>
    <p id="sj-error"></p>
    <pre id="sj-error-code"></pre>

    <script>
      // Read the target URL from the hash (set by proxy.html)
      (function () {
        var hash = location.hash;
        if (!hash || hash.length <= 1) return;
        var target = decodeURIComponent(hash.slice(1));

        // Wait for all deferred scripts (register-sw.js, search.js, index.js) to load,
        // then trigger the form submit exactly as a user would — index.js handles the rest.
        window.addEventListener('load', function () {
          var addr = document.getElementById('sj-address');
          var form = document.getElementById('sj-form');
          if (!addr || !form) return;
          addr.value = target;
          form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
        });
      })();
    </script>
  </body>
</html>
